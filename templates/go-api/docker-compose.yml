services:
  api:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    restart unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

